[neopixel LED]
pin: PA8
chain_count: 25
#color_order: RGB

[gcode_macro LED]
gcode:
  {% set P = params.P|default(0)|int %}
  {% for index in range(1, 23) %}
    SET_LED LED=LED RED={P/100|float} GREEN={P/100|float} BLUE={P/100|float} INDEX={index}
  {% endfor %}

[gcode_macro LED_ALL_OFF]
gcode:
  SET_LED LED=LED RED=0 GREEN=0 BLUE=0

[gcode_macro LED_OFF]
gcode:
  {% for index in range(0, 23) %}
    SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX={23-index}
  {% endfor %}

[gcode_macro LED_BASSI]
gcode:
  LED P=30

[gcode_macro LED_MEDI]
gcode:
  LED P=60

[gcode_macro LED_MAX]
gcode:
  LED P=100

[gcode_macro LED_EXT_ON]
gcode:
  {% for index in range(23, 26) %}
    SET_LED LED=LED RED=1 GREEN=1 BLUE=1 INDEX={index}
  {% endfor %}

[gcode_macro LED_EXT_OFF]
gcode:
  {% for index in range(0, 3) %}
    SET_LED LED=LED RED=0 GREEN=0 BLUE=0 INDEX={25-index}
  {% endfor %}

[gcode_macro STOP_EFFETTI]
gcode:
  STOP_LED_EFFECTS

[led_effect k2000]
autostart: false
frame_rate: 24
leds:
  neopixel:LED (1-22)
layers:
  	comet 1 1 add (0.34, 0.89, 0.96),(0.34, 0.89, 0.96)
	comet -1 1 add (0.34, 0.89, 0.96),(0.34, 0.89, 0.96)

[led_effect critical_error]
leds:
    neopixel:LED 
layers:
    strobe         1  1.5   add        (1.0,  1.0, 1.0)
    breathing      2  0     difference (0.95, 0.0, 0.0)
    static         1  0     top        (1.0,  0.0, 0.0)
autostart:                             false
frame_rate:                            24
run_on_error:                          true

